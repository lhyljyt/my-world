<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LHY的个人主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --accent:#0ea5e9;
      --accent2:#22c55e;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Noto Sans SC",sans-serif;
      color:#e2e8f0;
      background:
        radial-gradient(circle at 10% 10%, #1d4ed8 0%, transparent 35%),
        radial-gradient(circle at 90% 20%, #0ea5e9 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:48px 18px 72px;
    }

    .hero{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:20px;
      align-items:center;
      margin-bottom:28px;
    }

    .avatar{
      width:120px;height:120px;border-radius:50%;
      background:linear-gradient(135deg,#38bdf8,#22c55e);
      display:grid;place-items:center;
      font-size:42px;font-weight:900;color:white;
      box-shadow:0 12px 30px rgba(14,165,233,.35);
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(28px,5vw,44px);
      line-height:1.1;
      color:white;
    }

    .subtitle{
      margin:0;
      color:#cbd5e1;
      font-size:17px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:16px;
      margin-top:22px;
    }

    .card{
      background:var(--card);
      color:var(--text);
      border-radius:18px;
      padding:20px;
      box-shadow:0 10px 30px rgba(2,6,23,.2);
      transform:translateY(0);
      transition:.25s ease;
    }

    .card:hover{transform:translateY(-4px)}
    .card h2{margin:0 0 10px;font-size:20px}
    .card p{margin:0;color:var(--muted);line-height:1.7}

    .tag{
      display:inline-block;
      margin:6px 8px 0 0;
      padding:6px 10px;
      border-radius:999px;
      background:#e0f2fe;
      color:#075985;
      font-size:13px;
      font-weight:700;
    }

    .links a{
      display:block;
      margin:8px 0;
      color:#0369a1;
      text-decoration:none;
      font-weight:600;
    }

    .links a:hover{text-decoration:underline}

    footer{
      margin-top:26px;
      color:#cbd5e1;
      font-size:14px;
      text-align:center;
    }

    @media (max-width:640px){
      .hero{grid-template-columns:1fr; text-align:center}
      .avatar{margin:0 auto}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="avatar">你</div>
      <div>
        <h1>你好，我是你的名字</h1>
        <p class="subtitle">存储、后端学习者</p>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2>关于我</h2>
        <p>
          这里写一段自我介绍：你做什么、擅长什么、正在追求什么。
        </p>
      </article>

      <article class="card">
        <h2>技能</h2>
        <span class="tag">Linux</span>
        <span class="tag">C++</span>
        <span class="tag">mmWave radar</span>
      </article>

      <article class="card">
        <h2>我的项目</h2>
        <p>Project A - mini-kvStore</p>
        <p>Project B - Accelerate_fileIO</p>
        <!-- <p>Project C - 简短介绍</p> -->
      </article>

      <article class="card links">
        <h2>联系我</h2>
        <a href="https://github.com/llllllhyLiang" target="_blank">GitHub</a>
        <a href="1641844077@qq.com">Email</a>
        <!-- <a href="#" target="_blank">你的其他链接（博客/小红书/知乎）</a> -->
      </article>
    </section>

    <footer>
      © 2026 LHY · Built with GitHub Pages
    </footer>
  </main>
</body>
</html>
